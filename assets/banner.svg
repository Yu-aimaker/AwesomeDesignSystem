<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" role="img"
     aria-label="AwesomeDS — the evidence-first design instrument for people and AI agents">
  <title>AwesomeDS</title>
  <desc>A self-contained, source-cited design-system knowledge base and skill suite. White paper canvas, blueprint dot field, and the ember "proof mark" signature. Read design-system/INDEX.md first.</desc>

  <defs>
    <!-- Blueprint dot field — the instrument's measuring plane. -->
    <pattern id="grid" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#E7E7E2"/>
    </pattern>
    <linearGradient id="gridFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff" stop-opacity="0"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0.85"/>
    </linearGradient>
    <style>
      .wm   { font-family: "Newsreader","Georgia",ui-serif,serif; }
      .body { font-family: "IBM Plex Sans",system-ui,-apple-system,"Segoe UI",Helvetica,Arial,sans-serif; }
      .mono { font-family: "IBM Plex Mono","Geist Mono",ui-monospace,"SF Mono",Menlo,Consolas,monospace; }
      /* Calm signal pulse on the proof mark — surface stays white, halts on reduced motion. */
      .pulse { transform-box: fill-box; transform-origin: center; animation: pulse 4.5s ease-in-out infinite; }
      @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.62; } }
      @media (prefers-reduced-motion: reduce) { .pulse { animation: none; } }
    </style>
  </defs>

  <!-- Paper. White-based, dark ink — never a dark hero. -->
  <rect width="1280" height="400" fill="#FAFAF9"/>
  <rect x="24" y="24" width="1232" height="352" rx="20" fill="#FFFFFF" stroke="#E7E7E2" stroke-width="1.5"/>
  <rect x="25" y="25" width="1230" height="350" rx="19" fill="url(#grid)"/>
  <rect x="25" y="25" width="1230" height="350" rx="19" fill="url(#gridFade)"/>

  <!-- Instrument registration bar (top-left ember segment) + coordinate label. -->
  <rect x="24" y="24" width="96" height="3" rx="1.5" fill="#C0472A"/>
  <text class="mono" x="56" y="70" font-size="14" letter-spacing="1.5" fill="#8C8C85">[ DS · CANON→BUILD→EVIDENCE ]</text>
  <text class="mono" x="1216" y="70" text-anchor="end" font-size="14" letter-spacing="1" fill="#A2A29A">x1200 · y630 · v2026.07</text>

  <!-- Proof mark: ember square + knocked-out registration square. The 🎯 metaphor.
       Geometry matches the canonical spec (apps/docs/lib/proof-mark.ts, side=36):
       gap 9 · stroke 3 · knockout 18 · inset 9. Verified by proof-mark-geometry.test.ts. -->
  <g class="pulse" transform="translate(56,106)">
    <rect x="0" y="0" width="36" height="36" fill="#C0472A"/>
    <rect x="45" y="0" width="36" height="36" fill="#FFFFFF" stroke="#18181B" stroke-width="3"/>
    <rect x="54" y="9" width="18" height="18" fill="#18181B"/>
  </g>

  <!-- Editorial wordmark in ink + a single ember signature underline (no rainbow). -->
  <text class="wm" x="150" y="152" font-size="66" font-weight="600" letter-spacing="-2" fill="#18181B">AwesomeDS</text>
  <rect x="152" y="170" width="176" height="5" rx="2.5" fill="#C0472A"/>
  <text class="body" x="152" y="212" font-size="22" font-weight="500" fill="#57574F">The evidence-first design instrument — taste you can prove, for people and AI agents.</text>

  <!-- Real token chips: the system eats its own dog food. -->
  <g class="mono" font-size="15" fill="#6B6B66">
    <g><rect x="56" y="248" width="164" height="34" rx="8" fill="#FFFFFF" stroke="#E7E7E2"/><rect x="70" y="261" width="8" height="8" fill="#C0472A"/><text x="88" y="270">--color-accent</text></g>
    <g><rect x="232" y="248" width="118" height="34" rx="8" fill="#FFFFFF" stroke="#E7E7E2"/><text x="248" y="270">--space-4</text></g>
    <g><rect x="362" y="248" width="126" height="34" rx="8" fill="#FFFFFF" stroke="#E7E7E2"/><text x="378" y="270">--radius-lg</text></g>
    <g><rect x="500" y="248" width="140" height="34" rx="8" fill="#FFFFFF" stroke="#E7E7E2"/><text x="516" y="270">--ease-spring</text></g>
  </g>

  <!-- Evidence coordinates: proof, not a logo wall. -->
  <text class="mono" x="56" y="330" font-size="13" fill="#A2A29A">rule.* → ref.* · freshness-tracked · WCAG 2.2 AA · JP-first</text>

  <!-- Right-aligned proof block. -->
  <g text-anchor="end">
    <text class="body" x="1216" y="300" font-size="17" font-weight="700" fill="#3A3A33">128 cited sources · 47 rules · 5 skills · MIT</text>
    <text class="mono" x="1216" y="326" font-size="13" fill="#A2A29A">read design-system/INDEX.md first</text>
  </g>

  <!-- Signature ruler: measured ember ticks, not a rainbow stripe. -->
  <g fill="#E7E7E2">
    <rect x="0" y="394" width="1280" height="6" fill="#F2F2EE"/>
    <rect x="0" y="394" width="220" height="6" fill="#C0472A"/>
  </g>
</svg>
