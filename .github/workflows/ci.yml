name: ci
on:
  push:
  pull_request:
jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm qa:core
  browser:
    needs: core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm build
      - run: pnpm exec playwright test --retries=0
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-results
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
