name: dependency security

on:
  pull_request:
    paths:
      - "pnpm-lock.yaml"
      - "package.json"
      - "packages/**/package.json"
      - "apps/**/package.json"
      - ".github/workflows/security.yml"
  push:
    branches:
      - main
    paths:
      - "pnpm-lock.yaml"
      - "package.json"
      - "packages/**/package.json"
      - "apps/**/package.json"
      - ".github/workflows/security.yml"
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  osv-pr:
    if: github.event_name == 'pull_request'
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
    with:
      scan-args: |-
        --lockfile=pnpm-lock.yaml
      fail-on-vuln: true
      # Forked pull requests receive a read-only token. The check still blocks
      # newly introduced vulnerabilities; SARIF is uploaded by trusted runs.
      upload-sarif: false

  osv-full:
    if: github.event_name != 'pull_request'
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
    with:
      scan-args: |-
        --lockfile=pnpm-lock.yaml
      fail-on-vuln: true
      upload-sarif: true
