name: freshness
on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"
concurrency:
  group: freshness-${{ github.ref }}
  cancel-in-progress: false
jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@7088e561eb65bb68695d245aa206f005ef30921d # v4.1.0
        with:
          version: 10.5.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22.12
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm validate
      - id: freshness
        continue-on-error: true
        run: pnpm check:freshness -- --strict
      - id: links
        continue-on-error: true
        run: pnpm check:links -- --strict
      - name: Publish durable freshness state
        if: always()
        run: |
          snapshot="$RUNNER_TEMP/freshness-reports"
          mkdir -p "$snapshot"
          cp reports/freshness.json reports/source-observations.json reports/review-queue.json reports/link-check.json reports/freshness-summary.md "$snapshot/"
          git config user.name "awesome-ds-freshness[bot]"
          git config user.email "awesome-ds-freshness[bot]@users.noreply.github.com"
          published=false
          for attempt in 1 2 3; do
            git fetch origin "$GITHUB_REF_NAME"
            git switch --force-create freshness-publish "origin/$GITHUB_REF_NAME"
            mkdir -p reports
            cp "$snapshot"/* reports/
            git add reports/freshness.json reports/source-observations.json reports/review-queue.json reports/link-check.json reports/freshness-summary.md
            if git diff --cached --quiet; then
              published=true
              break
            fi
            git commit -m "chore: update freshness reports"
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              published=true
              break
            fi
            echo "Freshness publish attempt $attempt lost a branch race; retrying from the latest remote head."
          done
          test "$published" = true
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: freshness-report
          path: reports/
      - name: Enforce strict check outcomes
        if: always()
        env:
          FRESHNESS_OUTCOME: ${{ steps.freshness.outcome }}
          LINKS_OUTCOME: ${{ steps.links.outcome }}
        run: |
          if [ "$FRESHNESS_OUTCOME" != "success" ] || [ "$LINKS_OUTCOME" != "success" ]; then
            exit 1
          fi
